name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test
    # macOS: GPUI compiles Metal shaders, which needs a full Xcode toolchain.
    # GitHub's macOS runners point xcode-select at a real Xcode by default.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  deny:
    name: cargo-deny (supply chain)
    # No compile needed — cargo-deny reads the dependency graph — so the cheap
    # Linux runner is fine and runs in parallel with the macOS build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Supply-chain gate: security advisories, license policy, and the
      # git-source allow-list (see deny.toml).
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Cargo deny
        run: cargo deny check
