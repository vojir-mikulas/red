name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test
    # macOS: GPUI compiles Metal shaders, which needs a full Xcode toolchain.
    # GitHub's macOS runners point xcode-select at a real Xcode by default.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  drivers:
    name: network driver conformance (pg · mysql)
    # The network drivers (Postgres/MySQL) live in `red-driver`/`red-service`,
    # which don't depend on GPUI — so they build + test on the cheap Linux runner,
    # where GitHub Actions service containers are available (they aren't on macOS).
    # This exercises the conformance battery (NULL handling, cancel, keyset merge,
    # capped-vs-full bytes) against real engines instead of skipping silently.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: red
          POSTGRES_DB: red_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: red
          MARIADB_DATABASE: red_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      RED_TEST_POSTGRES_URL: host=127.0.0.1 user=postgres password=red dbname=red_test
      RED_TEST_MYSQL_URL: mysql://root:red@127.0.0.1:3306/red_test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@v2

      # Only the engine-facing crates — no GPUI build on Linux. `--nocapture` so a
      # missing service surfaces the `SKIP …` line instead of a silent pass.
      - name: Test (red-driver · red-service, live engines)
        run: cargo test -p red-driver -p red-service -- --nocapture

  cross:
    name: cross-platform build (${{ matrix.os }})
    # The full app builds + tests on macOS above; this guards that the Linux and
    # Windows GPUI backends keep compiling (e.g. a macOS-only API or a missing
    # cfg arm). Compile only — behaviour is verified on the macOS runner.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux GPUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang cmake protobuf-compiler \
            libfontconfig-dev libfreetype-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-shm0-dev \
            libasound2-dev libssl-dev libvulkan-dev libgbm-dev

      - name: Build (red app)
        run: cargo build -p red

  deny:
    name: cargo-deny (supply chain)
    # No compile needed — cargo-deny reads the dependency graph — so the cheap
    # Linux runner is fine and runs in parallel with the macOS build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Supply-chain gate: security advisories, license policy, and the
      # git-source allow-list (see deny.toml).
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Cargo deny
        run: cargo deny check
