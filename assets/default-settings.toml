# RED settings — the reference defaults.
#
# This is RED's settings documentation: every key, with its default and a one-line
# note. Copy what you want into your own settings.toml (open it from the command
# palette — ⌘K → "settings: open file"). Edits there apply live, no restart.
#
# The file degrades per section: a single bad value defaults just its own section
# and shows a banner — it never resets the whole file. A missing file is fine; RED
# launches on these defaults.
#
# Location:
#   macOS    ~/Library/Application Support/red/settings.toml
#   Linux    ~/.config/red/settings.toml          (XDG)
#   Windows  %APPDATA%\red\settings.toml

[appearance]
# The color theme. Either a single name…
theme = "One Dark"
#   …or a mode-aware pair that follows the OS (or forces light / dark):
# theme = { mode = "system", light = "Ayu Light", dark = "One Dark" }
#   mode = "system" | "light" | "dark"
# Built-in themes: "One Dark", "GitHub Dark", "Ayu Light". Drop your own theme
# files into <config>/red/themes/*.toml (or import them from the settings panel):
#
#   name = "My Theme"
#   appearance = "dark"      # "dark" | "light"
#   base = "One Dark"        # built-in to inherit unset tokens from (optional)
#   accent = "#ff8800"       # override any token by name, as #RRGGBB
#   bg_app = "#101013"
#
# The accent is whatever the theme defines — there is no separate accent override.

# Interface fonts: a sans family for chrome and a mono family for in-UI data
# (result grid cells, schema identifiers). Both share `ui_font_size` (px, clamped
# to 8–32); the whole UI scales from it. Match the two families for a uniform look.
# Also settable from the Appearance panel. The SQL editor has its own [editor] font.
ui_font_family = "IBM Plex Sans"
ui_mono_family = "IBM Plex Mono"
ui_font_size = 13

[editor]
# SQL editor typography. A monospace family is recommended. `line_height` is a
# multiple of the font size (clamped to 1.0–3.0). Family + size are also in the
# Appearance panel; line_height and tab_width live here.
font_family = "IBM Plex Mono"
font_size = 13
line_height = 1.5
tab_width = 2

[grid]
# Row spacing: "compact" | "comfortable" | "spacious".
density = "comfortable"

# What a SQL NULL renders as in a cell (e.g. "∅", "NULL", or "" for blank).
null_display = "NULL"

# Show the leading row-number gutter.
row_numbers = true

# Hard cap on the characters of any one cell kept resident — the fat-cell memory
# rail. The driver reads over-cap blobs by length only and clips long text to a
# prefix, so a page of huge cells can't spike RAM. Export stays full-fidelity.
# Clamped to 256–1048576.
max_cell_chars = 4096

# Rows pulled per page as you scroll — the keyset/offset fetch window. Larger
# pages mean fewer round-trips but more resident rows. Clamped to 20–5000.
page_size = 200

[query]
# Append LIMIT n to a bare `SELECT *` so a fat table can't flood the grid.
# Set to 0 to disable. Queries that write their own LIMIT are left untouched.
auto_limit = 1000

# Ask before running DROP / TRUNCATE / DELETE-without-WHERE and similar.
confirm_destructive = true

# Abort a query — and each of its page/run fetches — that runs longer than this
# many seconds, at the engine. 0 disables the cap.
statement_timeout = 0

[behavior]
# Reconnect to the most recently used connection on launch (credentials come from
# the OS keychain). Off shows the connection picker.
restore_last_session = false

[ai]
# The master switch for the grounded chat agent (⌘L). false is a true kill
# switch — no panel entry point, no local MCP server, no agent process. A
# connection can override it in connections.toml (ai_enabled).
enabled = true

# Which backend handles turns:
#   "anthropic"    — the Claude Messages API, billed to an API key (keychain/env).
#   "subscription" — Claude Code over ACP, billed to a Pro/Max subscription.
provider = "anthropic"

# How much the agent's tools can see (the capability boundary):
#   "off"    — no database tools; the agent chats without DB grounding.
#   "schema" — structure only (tables, columns, types) — never row data.
#   "read"   — the full read catalog: capped SELECTs + EXPLAIN. A tool above the
#              tier is never offered to the model.
#   "write"  — adds the gated propose_write tool (a single INSERT/UPDATE/DELETE that
#              needs your explicit per-statement approval, is blocked on read-only
#              connections, and never runs DDL or an unqualified UPDATE/DELETE).
# A connection can override this in connections.toml (ai_tier) — e.g. keep the
# global default at "read" and grant "write" only on a specific trusted connection,
# or flip it on per writable connection via the connection form's "Allow writes".
tier = "read"

# Model id for the API-key path. Empty falls back to the Opus default. The
# subscription agent picks its own model.
model = "claude-opus-4-8"

# Surface a summarized "thinking…" affordance while the model reasons.
show_thinking = false

# Advanced: override the subscription agent's launch command. Empty uses the
# default (npx -y @agentclientprotocol/claude-agent-acp).
agent_command = ""

# Multiple agents. Define named profiles and pick which a new chat starts on with
# the selector in the panel (and manage them in Settings → AI). When NO [[ai.agents]]
# are defined, two are synthesized from the keys above ("anthropic" API + "subscription"
# ACP) so this section is optional. Each profile's API key lives in the OS keyring
# under `ai-key:<id>`, never here. `kind` is "api" (Messages API via red-ai, optional
# base_url) or "acp" (an external agent over ACP — Claude Code, codex, a local agent).
#
# default_agent = "claude-sub"
#
# [[ai.agents]]
# id = "claude-sub"
# name = "Claude (subscription)"
# kind = "acp"
# command = ""              # empty = default Claude Code invocation
#
# [[ai.agents]]
# id = "codex"
# name = "Codex"
# kind = "acp"
# command = "codex acp"
#
# [[ai.agents]]
# id = "claude-api"
# name = "Claude (API)"
# kind = "api"
# wire = "anthropic"
# model = "claude-opus-4-8"
#
# [[ai.agents]]
# id = "local"
# name = "Local"
# kind = "api"
# wire = "anthropic"        # an Anthropic-wire-compatible endpoint
# base_url = "http://127.0.0.1:8080"
# model = "..."

[ai.limits]
# Defense-in-depth caps the read-tier tools run under. Each can be disabled with 0
# (where noted), but the defaults are sane ceilings.

# Hard row ceiling on one tool SELECT; a larger LIMIT is clamped down to this.
max_rows = 1000

# Per-tool-call statement timeout in milliseconds. 0 disables it.
statement_timeout_ms = 15000

# Trim a tool result larger than this (bytes) before it reaches the model. 0 off.
max_result_bytes = 262144

# Cumulative tool-call budget per conversation, bounding a runaway loop. 0 off.
max_tool_calls = 100
