# cargo-deny configuration — supply-chain gate for CI.
# Run locally with `cargo deny check`. See https://embarkstudios.github.io/cargo-deny.

[advisories]
yanked = "deny"
# Flag "unmaintained" crates only when WE depend on them directly — the GPUI git
# tree drags in a few transitively that we can't fix and that are not
# vulnerabilities. A vulnerability anywhere still fails the build.
unmaintained = "workspace"
ignore = [
    # RUSTSEC-2023-0071 — Marvin timing sidechannel in the `rsa` crate. Pulled in
    # transitively by `russh` (our pure-Rust SSH client for jump-host tunnels), via
    # `ssh-key` for RSA host/auth key handling. There is no patched release yet
    # ("No safe upgrade is available"), and the attack requires an adversary
    # observing the timing of RSA private-key operations over the network — RED
    # only exercises rsa during the handshake of an outbound SSH tunnel the user
    # explicitly configures to their own jump host. Revisit when rsa ships a
    # constant-time fix (https://github.com/RustCrypto/RSA/issues/626).
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0194 / RUSTSEC-2026-0195 — DoS (quadratic attribute scan;
    # unbounded namespace-declaration allocation) in `quick-xml` 0.39.x, fixed in
    # 0.41.0. We can't take the fix: quick-xml is pulled in ONLY on Linux and ONLY
    # transitively through the pinned Zed/GPUI git tree — via `wayland-scanner`
    # (a build-time proc-macro parsing the system's own Wayland protocol XML) and
    # `zbus_xml` (parsing D-Bus introspection XML from the session bus for the
    # AccessKit accessibility bridge). Both pin `^0.39`, so 0.41 needs a Zed-rev
    # bump, which is a cross-repo contract we don't move casually (see CLAUDE.md).
    # Neither path parses attacker-controlled XML — the "attacker" would already be
    # a local malicious compositor or D-Bus peer. Drop these once the Zed rev
    # carries wayland/zbus crates on quick-xml >=0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# RED is licensed GPL-3.0-or-later (see LICENSE / NOTICE): GPUI's tree pulls in
# GPL-3.0-or-later utility crates from the Zed repo, and RED's own crates inherit
# that license to match. Everything else is the permissive set GPUI + the
# dependency graph use. Anything NOT listed (a stricter copyleft like AGPL, an
# unknown license) still fails the build.
allow = [
    "GPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "NCSA",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "Zlib",
    "bzip2-1.0.6",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are unavoidable in a large git dep tree — warn, don't fail.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# GPUI (and its forked deps) plus Flint are pinned to git revs — see root
# Cargo.toml. Anything outside this list fails the source check.
allow-git = [
    "https://github.com/vojir-mikulas/flint",
    "https://github.com/zed-industries/zed",
    "https://github.com/zed-industries/wgpu",
    "https://github.com/zed-industries/font-kit",
    "https://github.com/zed-industries/scap",
    "https://github.com/zed-industries/xim-rs",
]
